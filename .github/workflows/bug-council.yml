name: Bug Council Daily Audit

on:
  schedule:
    # 9:00 AM Pacific (UTC-7 PDT / UTC-8 PST)
    # 16:00 UTC = 9 AM PDT; shifts to 8 AM PST in winter
    - cron: "0 16 * * 1-5" # Weekdays only
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  bug-council:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    env:
      # Placeholders so tsc/build don't fail during verification
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      CLERK_SECRET_KEY: sk_test_placeholder
      PLAID_CLIENT_ID: placeholder
      PLAID_PRODUCTION_SECRET: placeholder
      PLAID_SANDBOX_SECRET: placeholder
      PLAID_ENV: sandbox
      GOOGLE_CLIENT_ID: placeholder
      GOOGLE_CLIENT_SECRET: placeholder
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/gmail/callback
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      APP_URL: http://localhost:3000
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git for commits
        run: |
          git config user.name "bug-council[bot]"
          git config user.email "bug-council[bot]@users.noreply.github.com"

      - name: Run Bug Council
        run: |
          claude -p "$(cat .claude/commands/bug-council.md)

          Execute the Bug Council skill exactly as described above:
          1. Create a branch named fix/bug-council-$(date +%Y%m%d)
          2. Run Phase 1: Spawn all 12 audit agents in parallel (10 technical + 2 product flow)
          3. Run Phase 2: Triage — collect, deduplicate, prioritize findings
          4. Run Phase 3: Spawn fixer agents for each code-only bug, commit each fix
          5. Run verification: tsc --noEmit and vitest run
          6. Run Phase 4: Create a single PR with all fixes

          This is an automated daily run. Do not ask for confirmation — proceed through all phases automatically." \
          --dangerously-skip-permissions \
          --max-turns 200 \
          --verbose
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
