# When someone else merges to main, Vercel may block (author lacks access).
# This adds an empty commit authored by harshils2340 so deploy triggers.
# Uses [skip ci] to prevent the push from re-triggering this workflow (no loop).

name: Trigger Deploy on External Merge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Coconut-Banking/coconut'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check if we need to add deploy trigger
        id: check
        run: |
          # Head commit author email
          AUTHOR=$(git log -1 --format='%ae')
          MSG=$(git log -1 --format='%s')
          # Skip if this is our own trigger commit (loop guard)
          if [[ "$MSG" == *"[skip ci]"* ]] && [[ "$MSG" == *"trigger deploy"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Skip if author has Vercel access (harshils2340)
          if [[ "$AUTHOR" == *"harshils2340"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Add deploy trigger commit
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "harshils2340"
          git config user.email "harshils2340@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger deploy for Vercel [skip ci]"
          git push origin main
