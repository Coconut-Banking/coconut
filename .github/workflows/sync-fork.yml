# Sync Coconut-Banking/coconut main → harshils2340/coconut on every push to main.
# Requires: Add secret HARSHIL_FORK_PAT in repo Settings → Secrets.
# PAT must have repo scope (from harshils2340 account).
name: Sync to harshils fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to harshils fork
        run: |
          git remote add harshils https://x-access-token:${{ secrets.HARSHIL_FORK_PAT }}@github.com/harshils2340/coconut.git 2>/dev/null || git remote set-url harshils https://x-access-token:${{ secrets.HARSHIL_FORK_PAT }}@github.com/harshils2340/coconut.git
          git push harshils HEAD:main
        if: ${{ secrets.HARSHIL_FORK_PAT != '' }}
