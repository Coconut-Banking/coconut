# Sync Coconut-Banking/coconut main → harshils2340/coconut on every push to main.
# Adds an empty commit authored by harshils2340 so Vercel accepts the deploy
# (Vercel blocks when commit author lacks project access).
# Requires: HARSHIL_FORK_PAT secret (from harshils2340 account, repo scope).
name: Sync to harshils fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync and add deploy trigger commit
        env:
          PAT: ${{ secrets.HARSHIL_FORK_PAT }}
        run: |
          git remote add harshils https://x-access-token:${PAT}@github.com/harshils2340/coconut.git 2>/dev/null || git remote set-url harshils https://x-access-token:${PAT}@github.com/harshils2340/coconut.git
          git push harshils HEAD:main --force
          # Empty commit authored by harshils2340 so Vercel deploys (bypasses author-block)
          git config user.name "harshils2340"
          git config user.email "harshils2340@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger deploy [sync from Coconut-Banking]"
          git push harshils HEAD:main
        if: ${{ secrets.HARSHIL_FORK_PAT != '' }}
